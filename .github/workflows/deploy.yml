name: Deploy to Docker Registry

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  DOCKER_REGISTRY_ENDPOINT: registry.sapico.me
  DOTNET_VERSION: "10.0"

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0
    steps:
      - uses: actions/checkout@v4

      - name: Restore
        run: dotnet restore Skoruba.IdentityServer4.Admin.sln

      - name: Build
        run: dotnet build Skoruba.IdentityServer4.Admin.sln --no-restore --configuration Release

  deploy-sts:
    name: Deploy saas-sapico-sts
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Registry
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login ${{ env.DOCKER_REGISTRY_ENDPOINT }} -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push saas-sapico-sts
        run: |
          docker build -f src/Skoruba.IdentityServer4.STS.Identity/Dockerfile \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.type=identity" \
            --label "org.opencontainers.image.audience=internal" \
            -t ${{ env.DOCKER_REGISTRY_ENDPOINT }}/saas-sapico-sts:${{ github.sha }} \
            -t ${{ env.DOCKER_REGISTRY_ENDPOINT }}/saas-sapico-sts:${{ github.ref_name }} \
            -t ${{ env.DOCKER_REGISTRY_ENDPOINT }}/saas-sapico-sts:latest \
            .
          docker push ${{ env.DOCKER_REGISTRY_ENDPOINT }}/saas-sapico-sts --all-tags

  deploy-admin:
    name: Deploy saas-sapico-sts.admin
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Registry
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login ${{ env.DOCKER_REGISTRY_ENDPOINT }} -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push saas-sapico-sts.admin
        run: |
          docker build -f src/Skoruba.IdentityServer4.Admin/Dockerfile \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.type=identity" \
            --label "org.opencontainers.image.audience=internal" \
            -t ${{ env.DOCKER_REGISTRY_ENDPOINT }}/saas-sapico-sts.admin:${{ github.sha }} \
            -t ${{ env.DOCKER_REGISTRY_ENDPOINT }}/saas-sapico-sts.admin:${{ github.ref_name }} \
            -t ${{ env.DOCKER_REGISTRY_ENDPOINT }}/saas-sapico-sts.admin:latest \
            .
          docker push ${{ env.DOCKER_REGISTRY_ENDPOINT }}/saas-sapico-sts.admin --all-tags

  deploy-admin-api:
    name: Deploy saas-sapico-sts.admin.api
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Registry
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login ${{ env.DOCKER_REGISTRY_ENDPOINT }} -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push saas-sapico-sts.admin.api
        run: |
          docker build -f src/Skoruba.IdentityServer4.Admin.Api/Dockerfile \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.type=identity" \
            --label "org.opencontainers.image.audience=internal" \
            -t ${{ env.DOCKER_REGISTRY_ENDPOINT }}/saas-sapico-sts.admin.api:${{ github.sha }} \
            -t ${{ env.DOCKER_REGISTRY_ENDPOINT }}/saas-sapico-sts.admin.api:${{ github.ref_name }} \
            -t ${{ env.DOCKER_REGISTRY_ENDPOINT }}/saas-sapico-sts.admin.api:latest \
            .
          docker push ${{ env.DOCKER_REGISTRY_ENDPOINT }}/saas-sapico-sts.admin.api --all-tags
