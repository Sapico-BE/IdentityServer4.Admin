version: '3.4'
services:
  nginx-proxy:
    image: jwilder/nginx-proxy
    container_name: nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - '/var/run/docker.sock:/tmp/docker.sock:ro'
      - './shared/nginx/vhost.d:/etc/nginx/vhost.d'
      - './shared/nginx/certs:/etc/nginx/certs:ro'
    networks:
      proxy: null
      identityserverui:
        aliases:
          - sts.sapico.local
          - sts-admin.sapico.local
          - sts-admin-api.sapico.local
    restart: always
  saas.sapico.sts.identityserver4.admin:
    image: '${DOCKER_REGISTRY-}saas-sapico-sts-admin'
    build:
      context: .
      dockerfile: src/Skoruba.IdentityServer4.Admin/Dockerfile
    container_name: saas.sapico.sts.identityserver4.admin
    healthcheck:
      test: [ 'CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:8080/healthz || exit 1' ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    environment:
      - VIRTUAL_HOST=sts-admin.sapico.local
      - VIRTUAL_PORT=8080
      - 'ConnectionStrings__ConfigurationDbConnection=Host=saas.sapico.sts.identityserver4.db;Port=5432;Database=IdentityServer4Admin;Username=postgres;Password=${DB_PASSWORD:-postgres};'
      - 'ConnectionStrings__PersistedGrantDbConnection=Host=saas.sapico.sts.identityserver4.db;Port=5432;Database=IdentityServer4Admin;Username=postgres;Password=${DB_PASSWORD:-postgres};'
      - 'ConnectionStrings__IdentityDbConnection=Host=saas.sapico.sts.identityserver4.db;Port=5432;Database=IdentityServer4Admin;Username=postgres;Password=${DB_PASSWORD:-postgres};'
      - 'ConnectionStrings__AdminLogDbConnection=Host=saas.sapico.sts.identityserver4.db;Port=5432;Database=IdentityServer4Admin;Username=postgres;Password=${DB_PASSWORD:-postgres};'
      - 'ConnectionStrings__AdminAuditLogDbConnection=Host=saas.sapico.sts.identityserver4.db;Port=5432;Database=IdentityServer4Admin;Username=postgres;Password=${DB_PASSWORD:-postgres};'
      - 'ConnectionStrings__DataProtectionDbConnection=Host=saas.sapico.sts.identityserver4.db;Port=5432;Database=IdentityServer4Admin;Username=postgres;Password=${DB_PASSWORD:-postgres};'
      - 'AdminConfiguration__IdentityAdminRedirectUri=https://sts-admin.sapico.local/signin-oidc'
      - 'AdminConfiguration__IdentityServerBaseUrl=https://sts.sapico.local'
      - AdminConfiguration__RequireHttpsMetadata=false
      - 'IdentityServerData__Clients__0__ClientUri=https://sts-admin.sapico.local'
      - 'IdentityServerData__Clients__0__RedirectUris__0=https://sts-admin.sapico.local/signin-oidc'
      - 'IdentityServerData__Clients__0__FrontChannelLogoutUri=https://sts-admin.sapico.local/signout-oidc'
      - 'IdentityServerData__Clients__0__PostLogoutRedirectUris__0=https://sts-admin.sapico.local/signout-callback-oidc'
      - 'IdentityServerData__Clients__0__AllowedCorsOrigins__0=https://sts-admin.sapico.local'
      - 'IdentityServerData__Clients__1__RedirectUris__0=https://sts-admin-api.sapico.local/swagger/oauth2-redirect.html'
      - 'Serilog__WriteTo__1__Args__connectionString=Host=saas.sapico.sts.identityserver4.db;Port=5432;Database=IdentityServer4Admin;Username=postgres;Password=${DB_PASSWORD:-postgres};'
      - DockerConfiguration__UpdateCaCertificate=true
      - ASPNETCORE_ENVIRONMENT=Development
    command: dotnet Skoruba.IdentityServer4.Admin.dll /seed
    depends_on:
      saas.sapico.sts.identityserver4.db:
        condition: service_healthy
      saas.sapico.sts.identityserver4:
        condition: service_started
    volumes:
      - './shared/serilog.json:/app/serilog.json'
      - './shared/identitydata.json:/app/identitydata.json'
      - './shared/identityserverdata.json:/app/identityserverdata.json'
      - './shared/nginx/certs/cacerts.crt:/usr/local/share/ca-certificates/cacerts.crt'
    networks:
      identityserverui: null
    restart: unless-stopped
  saas.sapico.sts.identityserver4.admin-api:
    image: '${DOCKER_REGISTRY-}saas-sapico-sts-admin.api'
    build:
      context: .
      dockerfile: src/Skoruba.IdentityServer4.Admin.Api/Dockerfile
    container_name: saas.sapico.sts.identityserver4.admin-api
    healthcheck:
      test: [ 'CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:8080/healthz || exit 1' ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    environment:
      - VIRTUAL_HOST=sts-admin-api.sapico.local
      - VIRTUAL_PORT=8080
      - AdminApiConfiguration__RequireHttpsMetadata=false
      - 'AdminApiConfiguration__ApiBaseUrl=https://sts-admin-api.sapico.local'
      - 'AdminApiConfiguration__IdentityServerBaseUrl=https://sts.sapico.local'
      - 'ConnectionStrings__ConfigurationDbConnection=Host=saas.sapico.sts.identityserver4.db;Port=5432;Database=IdentityServer4Admin;Username=postgres;Password=${DB_PASSWORD:-postgres};'
      - 'ConnectionStrings__PersistedGrantDbConnection=Host=saas.sapico.sts.identityserver4.db;Port=5432;Database=IdentityServer4Admin;Username=postgres;Password=${DB_PASSWORD:-postgres};'
      - 'ConnectionStrings__IdentityDbConnection=Host=saas.sapico.sts.identityserver4.db;Port=5432;Database=IdentityServer4Admin;Username=postgres;Password=${DB_PASSWORD:-postgres};'
      - 'ConnectionStrings__AdminLogDbConnection=Host=saas.sapico.sts.identityserver4.db;Port=5432;Database=IdentityServer4Admin;Username=postgres;Password=${DB_PASSWORD:-postgres};'
      - 'ConnectionStrings__AdminAuditLogDbConnection=Host=saas.sapico.sts.identityserver4.db;Port=5432;Database=IdentityServer4Admin;Username=postgres;Password=${DB_PASSWORD:-postgres};'
      - 'ConnectionStrings__DataProtectionDbConnection=Host=saas.sapico.sts.identityserver4.db;Port=5432;Database=IdentityServer4Admin;Username=postgres;Password=${DB_PASSWORD:-postgres};'
      - DockerConfiguration__UpdateCaCertificate=true
      - ASPNETCORE_ENVIRONMENT=Development
    volumes:
      - './shared/serilog.json:/app/serilog.json'
      - './shared/nginx/certs/cacerts.crt:/usr/local/share/ca-certificates/cacerts.crt'
    depends_on:
      saas.sapico.sts.identityserver4.db:
        condition: service_healthy
    networks:
      identityserverui: null
    restart: unless-stopped
  saas.sapico.sts.identityserver4:
    image: '${DOCKER_REGISTRY-}saas-sapico-sts-web'
    build:
      context: .
      dockerfile: src/Skoruba.IdentityServer4.STS.Identity/Dockerfile
    container_name: saas.sapico.sts.identityserver4
    healthcheck:
      test: [ 'CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:8080/healthz || exit 1' ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    environment:
      - VIRTUAL_HOST=sts.sapico.local
      - VIRTUAL_PORT=8080
      - 'ConnectionStrings__ConfigurationDbConnection=Host=saas.sapico.sts.identityserver4.db;Port=5432;Database=IdentityServer4Admin;Username=postgres;Password=${DB_PASSWORD:-postgres};'
      - 'ConnectionStrings__PersistedGrantDbConnection=Host=saas.sapico.sts.identityserver4.db;Port=5432;Database=IdentityServer4Admin;Username=postgres;Password=${DB_PASSWORD:-postgres};'
      - 'ConnectionStrings__IdentityDbConnection=Host=saas.sapico.sts.identityserver4.db;Port=5432;Database=IdentityServer4Admin;Username=postgres;Password=${DB_PASSWORD:-postgres};'
      - 'ConnectionStrings__DataProtectionDbConnection=Host=saas.sapico.sts.identityserver4.db;Port=5432;Database=IdentityServer4Admin;Username=postgres;Password=${DB_PASSWORD:-postgres};'
      - 'AdminConfiguration__IdentityAdminBaseUrl=https://sts-admin.sapico.local'
      - 'IdentityServerOptions__IssuerUri=https://sts.sapico.local'
      - IdentityServerOptions__Events__RaiseErrorEvents=true
      - IdentityServerOptions__Events__RaiseInformationEvents=true
      - IdentityServerOptions__Events__RaiseFailureEvents=true
      - IdentityServerOptions__Events__RaiseSuccessEvents=true
      - DockerConfiguration__UpdateCaCertificate=true
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      saas.sapico.sts.identityserver4.db:
        condition: service_healthy
    volumes:
      - './shared/serilog.json:/app/serilog.json'
      - './shared/nginx/certs/cacerts.crt:/usr/local/share/ca-certificates/cacerts.crt'
    networks:
      identityserverui:
        aliases:
          - sts.sapico.local
    restart: unless-stopped
  saas.sapico.sts.identityserver4.db:
    image: 'postgres:18-alpine'
    ports:
      - '5432:5432'
    container_name: saas.sapico.sts.identityserver4.db
    environment:
      POSTGRES_DB: 'IdentityServer4Admin'
      POSTGRES_USER: 'postgres'
      POSTGRES_PASSWORD: '${DB_PASSWORD:-postgres}'
    volumes:
      # Named volume for persistent database storage across container updates
      # PostgreSQL 18+ stores data in a major-version subdirectory under /var/lib/postgresql
      - 'dbdata:/var/lib/postgresql'
    networks:
      identityserverui: null
    restart: unless-stopped
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U postgres' ]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  dbdata:
    driver: local
networks:
  proxy:
    driver: bridge
  identityserverui:
    driver: bridge
